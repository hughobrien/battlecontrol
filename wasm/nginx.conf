# nginx config for serving the WASM bundle with SharedArrayBuffer headers.
#
# SharedArrayBuffer (required for Emscripten pthreads / audio threading) is
# gated behind cross-origin isolation. Both headers below must be present on
# every response from the serving origin:
#
#   Cross-Origin-Opener-Policy: same-origin
#   Cross-Origin-Embedder-Policy: require-corp
#
# Quickstart (from repo root, after building the WASM bundle):
#
#   emcmake cmake --preset wasm && cmake --build build-wasm --target ra
#
#   nginx -c $PWD/wasm/nginx.conf \
#         -g "pid /tmp/ra-nginx.pid; error_log /tmp/ra-nginx.err; daemon off;"
#
#   # in another terminal:
#   curl -I http://localhost:8080/ra.html
#
# Nix shortcut (handles path wiring automatically):
#   nix run .#wasm-server
#
# For a different port, set PORT= before using the Nix app, or edit `listen`
# below when using nginx directly.

events {
    worker_connections 64;
}

http {
    # nginx ships a mime.types file; if running outside the Nix store, this
    # path may need adjusting (e.g. /etc/nginx/mime.types on Debian/Fedora).
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Cross-origin isolation headers — required for SharedArrayBuffer.
    add_header Cross-Origin-Opener-Policy   "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Emscripten .wasm files must be served as application/wasm, not
    # application/octet-stream, or Chrome/Firefox refuse to stream-compile.
    types {
        application/wasm  wasm;
    }

    sendfile on;

    server {
        listen       8080;
        server_name  localhost;

        # Adjust this path if you run nginx from a directory other than the
        # repo root, or if you changed the build-wasm output directory.
        root build-wasm;
        index ra.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
