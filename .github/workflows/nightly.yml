name: Nightly

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 500M

jobs:
  build-native:
    name: Native (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        compiler: [gcc, clang]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ clang \
            libsdl2-dev \
            xvfb \
            binutils \
            python3 \
            cmake \
            ninja-build \
            ccache \
            libsdl2-ttf-dev

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --max-size 500M

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-nightly-${{ matrix.compiler }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'installer/CMakeLists.txt') }}
          restore-keys: |
            ccache-nightly-${{ matrix.compiler }}-
            ccache-nightly-
            ccache-

      - name: Configure cmake
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            export CC=clang CXX=clang++
          fi
          cmake --preset linux-native \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build RA native
        run: cmake --build build --target ra --parallel

      - name: Build TD native
        run: cmake --build build --target td --parallel

      - name: Verify native binaries
        run: |
          for bin in ra td; do
            path="build/$bin"
            if ! file "$path" 2>/dev/null | grep -q "ELF 64-bit"; then
              echo "::error::$bin: invalid or missing at $path"
              exit 1
            fi
            size=$(stat -c%s "$path")
            echo "::notice::$bin: OK ($(numfmt --to=iec $size), ELF 64-bit)"
          done

      - name: Smoke-test under Xvfb
        run: |
          Xvfb :99 -screen 0 640x480x24 -ac &
          XVFB_PID=$!
          sleep 1
          if [ ! -e /tmp/.X99-lock ]; then
            echo "::error::Xvfb :99 did not start"
            exit 1
          fi
          PASS=0; FAIL=0
          for bin in ra td; do
            echo "::group::smoke: $bin"
            DISPLAY=:99 SDL_AUDIODRIVER=dummy timeout 5 "build/$bin" > "/tmp/smoke-${bin}.log" 2>&1 && RC=$? || RC=$?
            LOG=$(cat "/tmp/smoke-${bin}.log")
            echo "$LOG"
            if echo "$LOG" | grep -qE "SIGSEGV|Segmentation fault|signal 11|CRASH|Aborted"; then
              echo "::error::$bin: crash signal in output"
              FAIL=$((FAIL+1))
            elif [ "$RC" -eq 124 ] || [ "$RC" -eq 143 ]; then
              echo "::notice::$bin: alive — timed out (5 s)"
              PASS=$((PASS+1))
            else
              echo "::notice::$bin: exited with code $RC (non-crash)"
              PASS=$((PASS+1))
            fi
            echo "::endgroup::"
          done
          kill "$XVFB_PID" 2>/dev/null || true
          echo "smoke: pass=$PASS fail=$FAIL"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: ccache stats
        run: |
          echo "### ccache hit rate (nightly)" >> "$GITHUB_STEP_SUMMARY"
          ccache --show-stats >> "$GITHUB_STEP_SUMMARY"
          ccache --show-stats

      - name: Strip and package native binaries
        run: |
          mkdir -p artifacts/native
          for bin in ra td; do
            cp "build/$bin" "artifacts/native/$bin"
            strip "artifacts/native/$bin"
          done
          tar czf artifacts/native-linux-x86_64.tar.gz -C artifacts/native .

      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.compiler }}
          path: artifacts/native-linux-x86_64.tar.gz
          retention-days: 7

  build-wasm:
    name: WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ninja-build cmake ccache

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --max-size 500M

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-nightly-wasm-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'installer/CMakeLists.txt') }}
          restore-keys: |
            ccache-nightly-wasm-
            ccache-nightly-
            ccache-

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-nightly-${{ github.sha }}
          restore-keys: |
            emscripten-cache-nightly-
            emscripten-cache-

      - name: Configure WASM build
        run: |
          export CCACHE_DIR=${{ env.CCACHE_DIR }}
          emcmake cmake --preset wasm \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build ra.wasm
        run: cmake --build build-wasm --target ra --parallel

      - name: Build td.wasm
        run: cmake --build build-wasm --target td --parallel

      - name: Validate WASM binaries
        run: |
          python3 - <<'EOF'
          import os, struct
          MIN_SIZE = 1_000_000
          for name in ('build-wasm/ra.wasm', 'build-wasm/td.wasm'):
              with open(name, 'rb') as f:
                  magic = f.read(4)
              assert magic == b'\x00asm', f'{name}: invalid WASM magic {magic!r}'
              size = os.path.getsize(name)
              assert size > MIN_SIZE, f'{name}: suspiciously small ({size} bytes < {MIN_SIZE})'
              print(f'{name}: {size // 1024} KB — OK')
          EOF

      - name: ccache stats
        run: |
          echo "### ccache hit rate (nightly WASM)" >> "$GITHUB_STEP_SUMMARY"
          ccache --show-stats >> "$GITHUB_STEP_SUMMARY"
          ccache --show-stats

      - name: Package WASM artifacts
        run: |
          mkdir -p artifacts/wasm
          for game in ra td; do
            mkdir -p "artifacts/wasm/$game"
            cp "build-wasm/$game.html" "artifacts/wasm/$game/"
            cp "build-wasm/$game.js"   "artifacts/wasm/$game/"
            cp "build-wasm/$game.wasm" "artifacts/wasm/$game/"
            cp wasm/preloader.js           "artifacts/wasm/$game/"
            cp wasm/coi-serviceworker.min.js "artifacts/wasm/$game/"
            (cd "artifacts/wasm/$game" && zip -r "../../$game-wasm.zip" .)
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: artifacts/wasm/*.zip
          retention-days: 7

  generate-manifest:
    name: Generate manifest
    needs: [build-native, build-wasm]
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums and manifest
        run: |
          sha256sum *.tar.gz *.zip > checksums.sha256
          cat > nightly-manifest.txt <<MANIFEST
          Nightly Build: $(date -u +%Y-%m-%d)
          Commit: ${{ github.sha }}
          Run ID: ${{ github.run_id }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Artifacts:
          $(sha256sum *.tar.gz *.zip | sed 's/^/  /')
          MANIFEST

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: nightly-manifest
          path: |
            checksums.sha256
            nightly-manifest.txt
          retention-days: 30
