name: WASM Deploy

on:
  push:
    branches: [master]
    paths:
      - 'REDALERT/**'
      - 'TIBDAWN/**'
      - 'wasm/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    name: Build WASM + deploy to Cloudflare Pages
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '5.0.6'
          actions-cache-folder: 'emsdk-cache'

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ninja-build cmake

      - name: Configure WASM build
        run: emcmake cmake --preset wasm

      - name: Build ra.wasm
        run: cmake --build build-wasm --target ra --parallel

      - name: Build td.wasm
        run: cmake --build build-wasm --target td --parallel

      - name: Assemble deploy directory
        run: |
          cp build-wasm/ra.html  wasm/deploy/ra.html
          cp build-wasm/ra.js    wasm/deploy/ra.js
          cp build-wasm/ra.wasm  wasm/deploy/ra.wasm
          cp build-wasm/td.html  wasm/deploy/td.html
          cp build-wasm/td.js    wasm/deploy/td.js
          cp build-wasm/td.wasm  wasm/deploy/td.wasm
          cp wasm/preloader.js   wasm/deploy/preloader.js
          ls -lh wasm/deploy/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy wasm/deploy --project-name cnc-remastered-linux --commit-dirty=true
