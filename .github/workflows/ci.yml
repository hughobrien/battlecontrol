name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Compile and link
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ \
            libsdl2-dev \
            xvfb \
            binutils \
            python3 \
            cmake \
            ninja-build \
            libsdl2-ttf-dev

      - name: Build and smoke-test
        run: bash scripts/first-run-pass-94.sh

      - name: Configure RA cmake build
        run: cmake --preset linux-native

      - name: Build RA native (cmake)
        run: cmake --build build --target ra --parallel

      - name: Build TD native (cmake)
        run: cmake --build build --target td --parallel

  vqa-pixel-diff:
    name: VQA codec pixel-diff
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg python3

      - name: Regenerate synthetic test VQA
        # Ensures the committed test.vqa is bit-for-bit identical to what the
        # generator produces on this Python version (catches generator drift).
        run: |
          python3 scripts/gen_test_vqa.py e2e/goldens/vqa/test.vqa.new
          if ! diff -q e2e/goldens/vqa/test.vqa e2e/goldens/vqa/test.vqa.new; then
            echo "ERROR: committed test.vqa differs from generator output"
            echo "Run: python3 scripts/gen_test_vqa.py e2e/goldens/vqa/test.vqa"
            exit 1
          fi
          rm e2e/goldens/vqa/test.vqa.new

      - name: VQA pixel-diff — synthetic test VQA (always runs)
        # Compares our Python reference decoder against ffmpeg on the committed
        # synthetic VQA.  This gate always runs regardless of game-data presence.
        # Catches: codebook bugs, palette scaling bugs, solid-marker regressions.
        run: |
          python3 scripts/vqa-pixel-diff.py e2e/goldens/vqa/test.vqa \
            --frames 0,1,2 \
            --threshold 5

      - name: VQA pixel-diff — game VQA samples (skips if data absent)
        # Runs the same harness against real VQA files from MAIN.MIX when the
        # game data symlink build/run-172 is present.  Always exits 0 when data
        # is absent so the job does not block PRs from contributors without data.
        run: |
          if [ -f build/run-172/MAIN.MIX ]; then
            python3 scripts/vqa-pixel-diff.py build/run-172/MAIN.MIX \
              --frames 0,29,59 \
              --threshold 5 \
              --quiet
          else
            echo "SKIP: build/run-172/MAIN.MIX not found — game data absent"
            exit 0
          fi

  wine-comparison:
    name: Wine OG comparison
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and Chromium
        run: npm ci && npx playwright install --with-deps chromium

      - name: Install Wine32 + system tools
        # wine32:i386 provides 32-bit Wine support needed to run RA95.EXE (16/32-bit Win).
        # imagemagick provides `import` (screenshot capture used by wine-ra.sh).
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wine32:i386 xvfb xdotool imagemagick

      - name: Cache RA95.EXE
        # Keyed on RA95.EXE SHA-256 — immutable file, cache never expires.
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ra95-cache
          key: ra95-exe-a95e2ac85c4cc3aaacb7795e3c07b8aec7c3e10efe679766fb2ee15b12aa2d55

      - name: Prepare RA95.EXE
        # Pre-populate /opt/redalert from cache so wine-ra-setup.sh skips the 2.2 MB download.
        # wine-ra-setup.sh handles its own SHA verification, so a cache hit is safe.
        run: |
          sudo mkdir -p /opt/redalert && sudo chmod 777 /opt/redalert
          if [ -f "$RUNNER_TEMP/ra95-cache/RA95.EXE" ]; then
            echo "::notice::RA95 cache hit — copying to /opt/redalert"
            cp "$RUNNER_TEMP"/ra95-cache/* /opt/redalert/
          else
            echo "::notice::RA95 cache miss — downloading from archive.org"
            bash scripts/wine-ra-setup.sh
            mkdir -p "$RUNNER_TEMP/ra95-cache"
            cp /opt/redalert/*.EXE /opt/redalert/*.DLL "$RUNNER_TEMP/ra95-cache/" 2>/dev/null || true
          fi
          wine --version || true

      - name: Run OG Red Alert under Wine
        # wine-ra.sh requires DATA_DIR (/CnCRemastered/...) with MIX files.
        # On a fresh runner this directory is absent so the script exits 1 — we
        # catch that with || and record wine_ok=false so the test tier skips.
        id: wine-run
        run: |
          bash scripts/wine-ra.sh \
            && echo "wine_ok=true"  >> "$GITHUB_OUTPUT" \
            || echo "wine_ok=false" >> "$GITHUB_OUTPUT"

      - name: Set WINE_RA_READY when screenshots were captured
        if: steps.wine-run.outputs.wine_ok == 'true'
        run: echo "WINE_RA_READY=1" >> "$GITHUB_ENV"

      - name: Run Tier 1 + Tier 3 comparison tests
        # Tier 1 (MIX checksums) skips when /CnCRemastered is absent.
        # Tier 3 (Wine OG) skips when WINE_RA_READY is not set (wine-ra.sh failed).
        # On a fresh runner both tiers skip — job exits 0 (no failures).
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          XVFB_PID=$!
          sleep 2
          npx playwright test e2e/tim699-ra-compare.spec.ts \
            --grep "Tier 1|Tier 3" \
            --reporter=line
          PW_EXIT=$?
          kill "$XVFB_PID" 2>/dev/null || true
          exit $PW_EXIT

      - name: Upload comparison screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wine-comparison-screenshots
          path: e2e/screenshots/
          if-no-files-found: ignore
