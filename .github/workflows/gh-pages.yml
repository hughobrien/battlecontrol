# GitHub Pages Deploy — thin wrapper around flake apps.
# Local equivalent: nix run .#ci-build-wasm && nix run .#ci-wasm-smoke

name: GitHub Pages Deploy

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
    paths:
      - 'REDALERT/**'
      - 'TIBERIANDAWN/**'
      - 'wasm/**'
      - 'linux/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'e2e/**'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  EM_CACHE_DIR: ${{ github.workspace }}/.emscripten-cache

jobs:
  build-and-deploy:
    name: Build WASM + deploy to GitHub Pages
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5.0.5
        with:
          path: ${{ env.EM_CACHE_DIR }}
          key: emcc-cache-ghpages-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            emcc-cache-ghpages-
            emcc-cache-

      - name: Configure ccache
        run: |
          ccache --zero-stats
          ccache --max-size 500M

      - name: Cache ccache
        uses: actions/cache@v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-ghpages-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ccache-ghpages-
            ccache-

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright and browsers
        run: npm ci && npx playwright install --with-deps chromium firefox

      - name: Build WASM + validate + smoke (ra.wasm, chromium)
        env:
          EM_CACHE: ${{ env.EM_CACHE_DIR }}
          CCACHE_DIR: ${{ env.CCACHE_DIR }}
        run: |
          nix develop --command bash -c "
            export EM_CACHE=${{ env.EM_CACHE_DIR }}
            export CCACHE_DIR=${{ env.CCACHE_DIR }}
            cmake --build build-wasm --target ra --parallel
            nix run .#validate-wasm
            nix run .#ci-wasm-smoke
          "

      - name: WASM smoke — ra.wasm (firefox)
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/wasm-smoke.spec.ts --project=firefox

      - name: Build td.wasm
        env:
          EM_CACHE: ${{ env.EM_CACHE_DIR }}
        run: |
          nix develop --command bash -c "
            export EM_CACHE=${{ env.EM_CACHE_DIR }}
            cmake --build build-wasm --target td --parallel
          "

      - name: WASM smoke — td.wasm (chromium + firefox)
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test \
            e2e/regression/T2-td-wasm-boot.spec.ts --project=chromium && \
          DISPLAY=:99 npx playwright test \
            e2e/regression/T2-td-wasm-boot.spec.ts --project=firefox

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-smoke-results
          path: |
            e2e/screenshots/
            e2e/test-results/

      - name: WASM parity — Tier 2 visual reference (asset-gated)
        env:
          RA_ASSETS_URL: ${{ vars.RA_ASSETS_URL || secrets.RA_ASSETS_URL || '' }}
        run: |
          if [ -z "$RA_ASSETS_URL" ]; then
            echo "::notice::parity skipped — RA_ASSETS_URL not set"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/tim699-ra-compare.spec.ts \
            --grep "Tier 2" --reporter=line

      - name: Upload wasm-parity screenshots
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-parity-screenshots
          path: e2e/screenshots/tim699-wasm-*.png
          if-no-files-found: ignore

      - name: WASM regression — T3 TD menu click (asset-gated)
        env:
          TD_ASSETS_URL: ${{ secrets.TD_ASSETS_URL }}
        run: |
          if [ -z "$TD_ASSETS_URL" ]; then
            echo "::notice::T3 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/regression/T3-td-wasm-menu.spec.ts

      - name: WASM regression — T6 TD mission start (asset-gated)
        env:
          TD_ASSETS_URL: ${{ secrets.TD_ASSETS_URL }}
        run: |
          if [ -z "$TD_ASSETS_URL" ]; then
            echo "::notice::T6 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/regression/T6-td-wasm-mission-start.spec.ts

      - name: WASM regression — T9 RA mission start (asset-gated)
        env:
          RA_ASSETS_URL: ${{ vars.RA_ASSETS_URL || secrets.RA_ASSETS_URL || '' }}
        run: |
          if [ -z "$RA_ASSETS_URL" ]; then
            echo "::notice::T9 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/regression/T9-ra-wasm-mission-start.spec.ts

      - name: WASM regression — T10 RA menu-bleed parity (asset-gated)
        env:
          RA_ASSETS_URL: ${{ vars.RA_ASSETS_URL || secrets.RA_ASSETS_URL || '' }}
        run: |
          if [ -z "$RA_ASSETS_URL" ]; then
            echo "::notice::T10 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 -ac &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/regression/T10-ra-wasm-post-game-menu.spec.ts

      - name: WASM gameplay SSIM gate — T11 (asset-gated)
        env:
          RA_ASSETS_URL: ${{ vars.RA_ASSETS_URL || secrets.RA_ASSETS_URL || '' }}
        run: |
          if [ -z "$RA_ASSETS_URL" ]; then
            echo "::notice::T11 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/wasm-gameplay.spec.ts --grep "6 ·" --reporter=line

      - name: Upload gameplay SSIM artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: t11-gameplay-ssim-results
          path: e2e/screenshots/ra-visual-*.png

      - name: TD audio pitch — T7 (asset-gated)
        env:
          TD_ASSETS_URL: ${{ secrets.TD_ASSETS_URL }}
        run: |
          if [ -z "$TD_ASSETS_URL" ]; then
            echo "::notice::T7 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/regression/T7-td-audio-pitch.spec.ts

      - name: RA audio pitch — T8 (asset-gated)
        env:
          RA_ASSETS_URL: ${{ vars.RA_ASSETS_URL || secrets.RA_ASSETS_URL || '' }}
        run: |
          if [ -z "$RA_ASSETS_URL" ]; then
            echo "::notice::T8 skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/regression/T8-ra-audio-pitch.spec.ts

      - name: TIM-695 TD WASM VQA
        env:
          TIM695_WASM_URL: http://localhost:8080/td.html
          TIM695_ASSET_URL: ${{ vars.TIM695_ASSET_URL || 'http://localhost:9090/' }}
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/tim695-td-wasm-vqa.spec.ts --reporter=line

      - name: RA gameplay full e2e (asset-gated)
        env:
          RA_ASSETS_URL: ${{ vars.RA_ASSETS_URL || secrets.RA_ASSETS_URL || '' }}
        run: |
          if [ -z "$RA_ASSETS_URL" ]; then
            echo "::notice::RA gameplay skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/wasm-gameplay.spec.ts --reporter=line

      - name: TD gameplay full e2e (asset-gated)
        env:
          TD_ASSETS_URL: ${{ secrets.TD_ASSETS_URL }}
        run: |
          if [ -z "$TD_ASSETS_URL" ]; then
            echo "::notice::TD gameplay skipped"
            exit 0
          fi
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 2
          python3 wasm/serve-coop.py &
          sleep 2
          DISPLAY=:99 npx playwright test e2e/td-gameplay.spec.ts --reporter=line

      - name: Assemble deploy directory
        run: |
          mkdir -p wasm/deploy
          cp build-wasm/ra.html  wasm/deploy/ra.html
          cp build-wasm/ra.js    wasm/deploy/ra.js
          cp build-wasm/ra.wasm  wasm/deploy/ra.wasm
          cp build-wasm/td.html  wasm/deploy/td.html
          cp build-wasm/td.js    wasm/deploy/td.js
          cp build-wasm/td.wasm  wasm/deploy/td.wasm
          cp wasm/preloader.js          wasm/deploy/preloader.js
          cp wasm/coi-serviceworker.min.js wasm/deploy/coi-serviceworker.min.js

      - name: Inject COI service worker
        run: |
          for f in wasm/deploy/ra.html wasm/deploy/td.html wasm/deploy/index.html; do
            sed -i 's|<head>|<head>\n  <script src="coi-serviceworker.min.js"></script>|' "$f"
          done

      - name: Generate version manifest
        run: |
          cat > wasm/deploy/version.json <<'EOF'
          {
            "commit": "${{ github.sha }}",
            "workflow_run_id": "${{ github.run_id }}",
            "build_time": "${{ github.action_start_time }}"
          }
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: wasm/deploy
          commit_message: 'deploy: ${{ github.sha }}'
