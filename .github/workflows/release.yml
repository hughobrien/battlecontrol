name: Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux-x86_64:
    name: Build RA Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ \
            libsdl2-dev \
            xvfb \
            binutils \
            python3

      - name: Build and smoke-test
        run: bash scripts/first-run-pass-94.sh

      - name: Strip and package
        run: |
          cp build/first-run-pass-94/redalert.elf redalert
          strip redalert
          tar czf redalert-linux-x86_64.tar.gz redalert

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: redalert-linux-x86_64
          path: redalert-linux-x86_64.tar.gz

  build-td-linux:
    name: Build TD Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ \
            cmake \
            ninja-build \
            libsdl2-dev \
            libsdl2-ttf-dev \
            binutils

      - name: Configure
        run: cmake --preset linux-native

      - name: Build TD
        run: cmake --build build --target td --parallel

      - name: Strip and package
        run: |
          strip build/td
          cp build/td td
          tar czf td-linux-x86_64.tar.gz td

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: td-linux-x86_64
          path: td-linux-x86_64.tar.gz

  build-ra-wasm:
    name: Build RA WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ninja-build cmake

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-ra-${{ github.sha }}
          restore-keys: |
            emscripten-cache-ra-
            emscripten-cache-

      - name: Configure WASM build
        run: emcmake cmake --preset wasm

      - name: Build ra.wasm
        run: cmake --build build-wasm --target ra --parallel

      - name: Package ra-wasm.zip
        run: |
          mkdir ra-wasm
          cp build-wasm/ra.html build-wasm/ra.js build-wasm/ra.wasm ra-wasm/
          cp wasm/preloader.js wasm/coi-serviceworker.min.js ra-wasm/
          zip -r ra-wasm.zip ra-wasm/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ra-wasm
          path: ra-wasm.zip

  build-td-wasm:
    name: Build TD WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ninja-build cmake

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-td-${{ github.sha }}
          restore-keys: |
            emscripten-cache-td-
            emscripten-cache-

      - name: Configure WASM build
        run: emcmake cmake --preset wasm

      - name: Build td.wasm
        run: cmake --build build-wasm --target td --parallel

      - name: Package td-wasm.zip
        run: |
          mkdir td-wasm
          cp build-wasm/td.html build-wasm/td.js build-wasm/td.wasm td-wasm/
          cp wasm/preloader.js wasm/coi-serviceworker.min.js td-wasm/
          zip -r td-wasm.zip td-wasm/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: td-wasm
          path: td-wasm.zip

  release:
    name: Create GitHub Release
    needs: [build-linux-x86_64, build-td-linux, build-ra-wasm, build-td-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate checksums and release manifest
        run: |
          sha256sum *.tar.gz *.zip > checksums.sha256
          cat > release-manifest.txt <<MANIFEST
          Release: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run ID: ${{ github.run_id }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Artifacts:
          $(sha256sum *.tar.gz *.zip | sed 's/^/  /')
          MANIFEST

      - name: Create release and attach artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.tar.gz
            *.zip
            checksums.sha256
            release-manifest.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
