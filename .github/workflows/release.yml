name: Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux-x86_64:
    name: Build RA Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build RA native + package
        run: nix develop --command nix run .#release-build-ra

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: redalert-linux-x86_64
          path: redalert-linux-x86_64.tar.gz

  build-td-linux:
    name: Build TD Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build TD native + package
        run: nix develop --command nix run .#release-build-td

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: td-linux-x86_64
          path: td-linux-x86_64.tar.gz

  build-ra-wasm:
    name: Build RA WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5.0.5
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-ra-${{ github.sha }}
          restore-keys: |
            emscripten-cache-ra-
            emscripten-cache-

      - name: Build ra.wasm
        env:
          EM_CACHE: ~/.emscripten_cache
        run: nix develop --command nix run .#build-wasm ra

      - name: Package ra-wasm.zip
        run: |
          mkdir ra-wasm
          cp build-wasm/ra.html build-wasm/ra.js build-wasm/ra.wasm ra-wasm/
          cp wasm/preloader.js wasm/coi-serviceworker.min.js ra-wasm/
          zip -r ra-wasm.zip ra-wasm/

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ra-wasm
          path: ra-wasm.zip

  build-td-wasm:
    name: Build TD WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Emscripten system libraries
        uses: actions/cache@v5.0.5
        with:
          path: ~/.emscripten_cache
          key: emscripten-cache-td-${{ github.sha }}
          restore-keys: |
            emscripten-cache-td-
            emscripten-cache-

      - name: Build td.wasm
        env:
          EM_CACHE: ~/.emscripten_cache
        run: nix develop --command nix run .#build-wasm td

      - name: Package td-wasm.zip
        run: |
          mkdir td-wasm
          cp build-wasm/td.html build-wasm/td.js build-wasm/td.wasm td-wasm/
          cp wasm/preloader.js wasm/coi-serviceworker.min.js td-wasm/
          zip -r td-wasm.zip td-wasm/

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: td-wasm
          path: td-wasm.zip

  release:
    name: Create GitHub Release
    needs: [build-linux-x86_64, build-td-linux, build-ra-wasm, build-td-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          merge-multiple: true

      - name: Generate checksums and release manifest
        run: |
          sha256sum *.tar.gz *.zip > checksums.sha256
          cat > release-manifest.txt <<MANIFEST
          Release: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run ID: ${{ github.run_id }}
          Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          Artifacts:
          $(sha256sum *.tar.gz *.zip | sed 's/^/  /')
          MANIFEST

      - name: Create release and attach artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            *.tar.gz
            *.zip
            checksums.sha256
            release-manifest.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
