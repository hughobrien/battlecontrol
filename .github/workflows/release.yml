name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            g++ \
            libsdl2-dev \
            xvfb \
            binutils \
            python3

      - name: Build and smoke-test
        run: bash scripts/first-run-pass-94.sh

      - name: Strip and package
        run: |
          cp build/first-run-pass-94/redalert.elf redalert
          strip redalert
          tar czf redalert-linux-x86_64.tar.gz redalert

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redalert-linux-x86_64
          path: redalert-linux-x86_64.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-linux-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
